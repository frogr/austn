:verbose: false
:concurrency: 5
:timeout: 25

:queues:
  - [critical, 3]
  - [gpu, 3]  # GPU-intensive tasks (AI chat, image generation)
  - [default, 2]
  - [low, 1]
  - [mailers, 2]

:scheduler:
  :schedule:
    gpu_health_check:
      cron: '0 * * * *'  # Every hour at minute 0
      class: GpuHealthCheckJob
      queue: default
      description: "Check GPU service health status"
    # Story generation disabled - no longer using live austn.net/endless integration
    # story_generation:
    #   cron: '*/30 * * * *'  # Every 30 minutes
    #   class: StoryGenerationJob
    #   queue: default
    #   description: "Generate next paragraph for Endless Story"
    cleanup_old_model3ds:
      cron: '0 */6 * * *'  # Every 6 hours
      class: CleanupOldModel3dsJob
      queue: low
      description: "Clean up expired 3D models"
    nyc_scrape_skint:
      cron: '5 6 * * *'   # 6:05am ET daily
      class: Nyc::ScrapeJob
      args: [ "skint" ]
      queue: low
      description: "Scrape The Skint daily NYC events"
    nyc_scrape_donyc:
      cron: '15 */3 * * *' # every 3 hours
      class: Nyc::ScrapeJob
      args: [ "donyc" ]
      queue: low
      description: "Scrape DoNYC event listings"
    nyc_scrape_time_out:
      cron: '25 6 * * 1'  # Mondays 6:25am ET
      class: Nyc::ScrapeJob
      args: [ "time_out" ]
      queue: low
      description: "Scrape Time Out NY happy hours weekly"
    nyc_scrape_ticketmaster:
      cron: '35 */2 * * *' # every 2 hours (no-op until key set)
      class: Nyc::ScrapeJob
      args: [ "ticketmaster" ]
      queue: low
      description: "Pull Ticketmaster Discovery NYC events"

# GPU queue configuration
# Run a separate Sidekiq process for GPU tasks:
# bundle exec sidekiq -q gpu -c 1
gpu_queue:
  :concurrency: 1  # Only one GPU task at a time
  :timeout: 300    # 5 minutes for GPU operations

production:
  :concurrency: 10

development:
  :concurrency: 2